name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint + tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (incl. dev)
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check src/ api/ tests/

      - name: Run tests
        run: uv run pytest -q
        env:
          # No CUDA on the runner — torch falls back to CPU automatically.
          CUDA_VISIBLE_DEVICES: ""
